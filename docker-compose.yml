version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: alpine_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: alpine_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/alpine_db
      - JWT_SECRET=alpine_enterprise_secret_123
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: alpine_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: alpine_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
